<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pagamentos — Travel Church Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../img/Adobe Express - file.png" style="max-height:28px;filter:drop-shadow(0 0 8px rgba(201,165,90,0.4))" alt="Logo"/>
      <span>Travel Church</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="index.html"      class="nav-link"><i class="fa-solid fa-chart-pie"></i> Visão Geral</a>
      <a href="pagamentos.html" class="nav-link active"><i class="fa-solid fa-credit-card"></i> Pagamentos</a>
      <a href="viajantes.html"  class="nav-link"><i class="fa-solid fa-users"></i> Viajantes</a>
      <span class="nav-section-label">Logística</span>
      <a href="onibus.html"     class="nav-link"><i class="fa-solid fa-bus"></i> Mapa do Ônibus</a>
      <a href="hotel.html"      class="nav-link"><i class="fa-solid fa-hotel"></i> Mapa do Hotel</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="DB.logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fa-solid fa-bars"></i>
      </button>
      <span class="topbar-title">Pagamentos</span>
      <div class="topbar-right">
        <div class="topbar-user"><i class="fa-solid fa-user-shield"></i> Administrador</div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <h1>Gestão de Pagamentos</h1>
        <p>Visualize, filtre e atualize o status financeiro de cada viajante</p>
      </div>

      <!-- Stats row -->
      <div class="stats-row" id="payStats"></div>

      <!-- Filters + Search -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="todos"    onclick="setFilter('todos',this)">Todos</button>
        <button class="filter-btn"        data-filter="pago"     onclick="setFilter('pago',this)">Pagos</button>
        <button class="filter-btn"        data-filter="pendente" onclick="setFilter('pendente',this)">Pendentes</button>
        <button class="filter-btn"        data-filter="analise"  onclick="setFilter('analise',this)">Em Análise</button>
        <button class="filter-btn"        data-filter="desistiu" onclick="setFilter('desistiu',this)">Desistências</button>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Buscar por nome ou CPF…" oninput="renderTable()"/>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Viajante</th>
              <th>CPF</th>
              <th>Método</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Alterar Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <h3><i class="fa-solid fa-pen"></i> Alterar Status</h3>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold btn-sm" onclick="saveStatus()">Salvar</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
  DB.requireAdmin();

  let currentFilter = 'todos';
  let editCpf = null;

  const statusMap = {
    pago:     {label:'Pago',       cls:'badge-paid'},
    pendente: {label:'Pendente',   cls:'badge-pending'},
    analise:  {label:'Em Análise', cls:'badge-analise'},
    desistiu: {label:'Desistência',cls:'badge-cancel'},
  };

  function renderStats() {
    const t = DB.travelers;
    const data = [
      {label:'Total', value:t.length, icon:'fa-list', cls:'stat-blue'},
      {label:'Pagos', value:t.filter(x=>x.payStatus==='pago').length, icon:'fa-check-circle', cls:'stat-green'},
      {label:'Pendentes', value:t.filter(x=>x.payStatus==='pendente'||x.payStatus==='analise').length, icon:'fa-hourglass-half', cls:'stat-yellow'},
      {label:'Arrecadado', value:`R$ ${(t.filter(x=>x.payStatus==='pago').length*850).toLocaleString('pt-BR')}`, icon:'fa-coins', cls:'stat-green'},
    ];
    document.getElementById('payStats').innerHTML = data.map(s=>`
      <div class="stat-card ${s.cls}">
        <i class="fa-solid ${s.icon}"></i>
        <div class="stat-card-info">
          <span class="stat-card-value">${s.value}</span>
          <span class="stat-card-label">${s.label}</span>
        </div>
      </div>
    `).join('');
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let data = DB.travelers;
    if (currentFilter !== 'todos') data = data.filter(t=>t.payStatus===currentFilter);
    if (search) data = data.filter(t=>t.nome.toLowerCase().includes(search)||t.cpf.includes(search));

    const tbody = document.getElementById('tableBody');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Nenhum resultado encontrado</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(t => {
      const st = statusMap[t.payStatus]||statusMap.analise;
      const method = t.payMethod==='pix' ? '<span style="color:var(--success)"><i class="fa-brands fa-pix"></i> PIX</span>' : t.payMethod==='boleto' ? '<span style="color:var(--warning)"><i class="fa-solid fa-barcode"></i> Boleto</span>' : '—';
      return `
        <tr>
          <td><strong style="color:var(--text)">${t.nome}</strong></td>
          <td style="font-family:monospace;font-size:0.8rem">${t.cpf}</td>
          <td>${method}</td>
          <td style="color:var(--gold);font-family:var(--font-s);font-size:1rem">R$ 850,00</td>
          <td><span class="badge ${st.cls}">${st.label}</span></td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="openEdit('${t.cpf}')">
              <i class="fa-solid fa-pen"></i> Alterar
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function openEdit(cpf) {
    editCpf = cpf;
    const t = DB.findTraveler(cpf);
    document.getElementById('modalContent').innerHTML = `
      <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:16px">
        Viajante: <strong style="color:var(--text)">${t.nome}</strong>
      </p>
      <div class="field-group">
        <label>Novo Status</label>
        <select id="newStatus">
          <option value="pago"     ${t.payStatus==='pago'    ?'selected':''}>✅ Pago / Confirmado</option>
          <option value="pendente" ${t.payStatus==='pendente'?'selected':''}>⏳ Pendente</option>
          <option value="analise"  ${t.payStatus==='analise' ?'selected':''}>🔍 Em Análise</option>
          <option value="desistiu" ${t.payStatus==='desistiu'?'selected':''}>❌ Desistência</option>
        </select>
      </div>
      <div class="field-group">
        <label>Método de Pagamento</label>
        <select id="newMethod">
          <option value="pix"    ${t.payMethod==='pix'   ?'selected':''}>PIX</option>
          <option value="boleto" ${t.payMethod==='boleto'?'selected':''}>Boleto Bancário</option>
        </select>
      </div>
    `;
    document.getElementById('modal').classList.remove('hidden');
  }

  function saveStatus() {
    const t = DB.findTraveler(editCpf);
    t.payStatus = document.getElementById('newStatus').value;
    t.payMethod = document.getElementById('newMethod').value;
    DB.saveTraveler(t);
    closeModal();
    renderStats();
    renderTable();
    showToast('Status atualizado com sucesso!');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    editCpf = null;
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  renderStats();
  renderTable();
</script>
</body>
</html>
