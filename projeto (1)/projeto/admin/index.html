<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Visão Geral — Travel Church Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .chart-card{background:var(--surface);border-radius:var(--r-lg);padding:28px;border:1px solid var(--surface-3)}
    .chart-card h3{font-family:var(--font-b);font-size:0.66rem;font-weight:600;color:var(--gold);margin-bottom:18px;letter-spacing:0.12em;text-transform:uppercase}
    .chart-card canvas{max-height:220px}
    .activity-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--surface-2)}
    .activity-item:last-child{border-bottom:none}
    .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .activity-text{flex:1;font-size:0.845rem;color:var(--text-2)}
    .activity-time{font-size:0.75rem;color:var(--text-3)}
    @media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../img/Adobe Express - file.png" style="max-height:28px;filter:drop-shadow(0 0 8px rgba(201,165,90,0.4))" alt="Logo"/>
      <span>Travel Church</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="index.html"      class="nav-link active"><i class="fa-solid fa-chart-pie"></i> Visão Geral</a>
      <a href="pagamentos.html" class="nav-link"><i class="fa-solid fa-credit-card"></i> Pagamentos</a>
      <a href="viajantes.html"  class="nav-link"><i class="fa-solid fa-users"></i> Viajantes</a>
      <span class="nav-section-label">Logística</span>
      <a href="onibus.html"     class="nav-link"><i class="fa-solid fa-bus"></i> Mapa do Ônibus</a>
      <a href="hotel.html"      class="nav-link"><i class="fa-solid fa-hotel"></i> Mapa do Hotel</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="DB.logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fa-solid fa-bars"></i>
      </button>
      <span class="topbar-title">Visão Geral</span>
      <div class="topbar-right">
        <div class="topbar-user"><i class="fa-solid fa-user-shield"></i> Administrador</div>
      </div>
    </header>

    <main class="page-content">

      <!-- Page header -->
      <div class="page-header">
        <h1>Visão Geral da Viagem</h1>
        <p>Resumo completo do status de inscrições, pagamentos e logística</p>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Charts -->
      <div class="chart-grid">
        <div class="chart-card">
          <h3>Distribuição de Pagamentos</h3>
          <canvas id="chartPagamentos"></canvas>
        </div>
        <div class="chart-card">
          <h3>Modo de Transporte</h3>
          <canvas id="chartTransporte"></canvas>
        </div>
      </div>

      <!-- Bottom row -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

        <!-- Recent activity -->
        <div class="card">
          <div class="card-header"><h2><i class="fa-solid fa-clock-rotate-left" style="margin-right:8px"></i>Atividade Recente</h2></div>
          <div class="card-body" id="activityList"></div>
        </div>

        <!-- Quick stats -->
        <div class="card">
          <div class="card-header"><h2><i class="fa-solid fa-chart-bar" style="margin-right:8px"></i>Resumo Rápido</h2></div>
          <div class="card-body" id="quickStats"></div>
        </div>

      </div>

    </main>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
  DB.requireAdmin();

  const travelers = DB.travelers;

  // Stats
  const stats = [
    { label:'Total Inscritos', value: travelers.length, icon:'fa-users', cls:'stat-blue' },
    { label:'Pagamentos Confirmados', value: travelers.filter(t=>t.payStatus==='pago').length, icon:'fa-check-circle', cls:'stat-green' },
    { label:'Pagamentos Pendentes', value: travelers.filter(t=>t.payStatus==='pendente'||t.payStatus==='analise').length, icon:'fa-hourglass-half', cls:'stat-yellow' },
    { label:'Desistências', value: travelers.filter(t=>t.payStatus==='desistiu').length, icon:'fa-user-minus', cls:'stat-red' },
  ];

  document.getElementById('statsRow').innerHTML = stats.map(s => `
    <div class="stat-card ${s.cls}">
      <i class="fa-solid ${s.icon}"></i>
      <div class="stat-card-info">
        <span class="stat-card-value">${s.value}</span>
        <span class="stat-card-label">${s.label}</span>
      </div>
    </div>
  `).join('');

  // Charts
  const chartOpts = {
    responsive:true,
    plugins:{legend:{labels:{color:'#8b93a8',font:{size:11},padding:14},position:'bottom'}}
  };

  new Chart(document.getElementById('chartPagamentos'),{
    type:'doughnut',
    data:{
      labels:['Pagos','Pendentes','Em Análise','Desistências'],
      datasets:[{
        data:[
          travelers.filter(t=>t.payStatus==='pago').length,
          travelers.filter(t=>t.payStatus==='pendente').length,
          travelers.filter(t=>t.payStatus==='analise').length,
          travelers.filter(t=>t.payStatus==='desistiu').length,
        ],
        backgroundColor:['#3dba7a','#e8a33a','#4a90d9','#e85555'],
        borderWidth:0,hoverOffset:6
      }]
    },
    options:{...chartOpts,cutout:'68%'}
  });

  new Chart(document.getElementById('chartTransporte'),{
    type:'doughnut',
    data:{
      labels:['Ônibus da Igreja','Veículo Próprio'],
      datasets:[{
        data:[
          travelers.filter(t=>t.transporte==='onibus').length,
          travelers.filter(t=>t.transporte==='proprio').length,
        ],
        backgroundColor:['#c9a55a','#4a5168'],
        borderWidth:0,hoverOffset:6
      }]
    },
    options:{...chartOpts,cutout:'68%'}
  });

  // Activity list
  const activities = [
    {dot:'#3dba7a', text:'Maria Silva confirmou pagamento via PIX', time:'há 2h'},
    {dot:'#4a90d9', text:'Lucas Mendes cadastrado como dependente', time:'há 4h'},
    {dot:'#e8a33a', text:'Ana Oliveira com boleto pendente', time:'há 6h'},
    {dot:'#c9a55a', text:'Carlos Souza alocado no assento 09', time:'há 8h'},
    {dot:'#e85555', text:'Fernanda Costa marcou desistência', time:'ontem'},
  ];

  document.getElementById('activityList').innerHTML = activities.map(a => `
    <div class="activity-item">
      <span class="activity-dot" style="background:${a.dot}"></span>
      <span class="activity-text">${a.text}</span>
      <span class="activity-time">${a.time}</span>
    </div>
  `).join('');

  // Quick stats
  const onibus = travelers.filter(t=>t.transporte==='onibus');
  const seatsOcupados = onibus.filter(t=>t.seat).length;
  const rooms = DB.hotelRooms;
  const totalCap = rooms.reduce((s,r)=>s+r.capacidade,0);
  const totalOcup = rooms.reduce((s,r)=>s+r.ocupantes.length,0);
  const arrecadado = travelers.filter(t=>t.payStatus==='pago').length * 850;

  const qs = [
    {label:'Assentos Ocupados', value:`${seatsOcupados}/${onibus.length}`, icon:'fa-bus', color:'var(--gold)'},
    {label:'Vagas do Hotel', value:`${totalOcup}/${totalCap}`, icon:'fa-hotel', color:'#a080e8'},
    {label:'Valor Arrecadado', value:`R$ ${arrecadado.toLocaleString('pt-BR')}`, icon:'fa-coins', color:'var(--success)'},
    {label:'Menores de Idade', value: travelers.filter(t=>t.idade==='menor').length, icon:'fa-child', color:'var(--warning)'},
  ];

  document.getElementById('quickStats').innerHTML = qs.map(q => `
    <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--surface-2)">
      <div style="width:36px;height:36px;border-radius:var(--r-sm);background:var(--ink-2);border:1px solid var(--surface-3);display:flex;align-items:center;justify-content:center;color:${q.color};font-size:0.9rem;flex-shrink:0">
        <i class="fa-solid ${q.icon}"></i>
      </div>
      <div style="flex:1">
        <div style="font-size:0.72rem;color:var(--text-3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px">${q.label}</div>
        <div style="font-family:var(--font-s);font-size:1.3rem;font-weight:300;color:${q.color}">${q.value}</div>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
